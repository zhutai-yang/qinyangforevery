name: CI — Build & Test

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

jobs:
  test-backend:
    name: Backend — compile & test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: tt_event_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Initialize test database
        run: |
          DB=tt-admin/tt-admin-api/src/main/resources/db
          sed -e 's/USE tt_event;//g' "$DB/schema.sql" | mysql -h127.0.0.1 -uroot tt_event_test
          mysql -h127.0.0.1 -uroot tt_event_test < "$DB/data.sql"

      - name: Maven verify
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: tt_event_test
          DB_USERNAME: root
          DB_PASSWORD: ""
        run: mvn -B clean verify

  build-frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run build:all
