server:
  port: ${SERVER_PORT:8096}

spring:
  application:
    name: tt-admin-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  servlet:
    multipart:
      max-file-size: ${SPRING_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${SPRING_MULTIPART_MAX_REQUEST_SIZE:50MB}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:tt_event}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:match123456}
    hikari:
      maximum-pool-size: 20

  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

tt:
  jwt:
    secret: ${TT_JWT_SECRET:please-change-to-256-bit-secret-key-for-production-min-32chars!!}
    expire-hours: ${TT_JWT_EXPIRE_HOURS:168}
  sync:
    mode: ${TT_SYNC_MODE:direct}
    scheduler:
      enabled: ${TT_SYNC_SCHEDULER_ENABLED:true}
      fixed-delay-ms: ${TT_SYNC_SCHEDULER_DELAY_MS:60000}
      stale-running-minutes: ${TT_SYNC_STALE_RUNNING_MINUTES:30}
  mq:
    ext-sync-queue: ${TT_MQ_EXT_SYNC_QUEUE:tt.ext.sync}
  files:
    base-dir: ${TT_FILES_BASE_DIR:./uploads}

logging:
  level:
    com.tt: INFO
    org.springframework.security: WARN
