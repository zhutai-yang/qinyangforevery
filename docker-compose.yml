name: tt-event

version: '3.8'

# 乒乓球赛事系统 — Docker Compose（对齐 IMP 基础设施 + 应用分层）
# 用法：
#   cp .env.example .env
#   docker compose up -d --build
#   访问 http://localhost:8888/ 与 http://localhost:8888/admin/

services:
  mysql:
    image: mysql:8.0
    container_name: tt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ttdevroot}
      MYSQL_DATABASE: ${DB_NAME:-tt_event}
      MYSQL_USER: ${DB_USERNAME:-tt_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ttsecret}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/mysql/init/02-data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
      - ./docker/mysql/conf.d/small-instance.cnf:/etc/mysql/conf.d/zz-small.cnf:ro
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ttdevroot}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tt-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-tt}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-ttsecret}
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5673}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15673}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  tt-admin-api:
    build:
      context: .
      dockerfile: tt-admin/tt-admin-api/Dockerfile
    image: tt-admin-api:local
    container_name: tt-admin-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8096"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-tt_event}
      DB_USERNAME: ${DB_USERNAME:-tt_user}
      DB_PASSWORD: ${DB_PASSWORD:-ttsecret}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-tt}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-ttsecret}
      TT_FILES_BASE_DIR: /data/uploads
      TT_JWT_SECRET: ${TT_JWT_SECRET:?Set TT_JWT_SECRET to a random string with at least 32 chars}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-admin123}
      TT_SYNC_MODE: ${TT_SYNC_MODE:-direct}
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "127.0.0.1:${API_PORT:-8096}:8096"
    expose:
      - "8096"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: tt-web:local
    container_name: tt-web
    restart: unless-stopped
    depends_on:
      tt-admin-api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8888}:80"

volumes:
  mysql_data:
  uploads_data:

networks:
  default:
    name: tt-network
